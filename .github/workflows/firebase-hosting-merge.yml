name: Build and deploy
'on':
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v5.0.5
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Install dependencies
        run: yarn --immutable
      - run: yarn test
      - run: yarn build --base /graphql-explorer/ --outDir build/graphql-explorer
        env:
          REACT_APP_VERSION: ${{ github.sha }}
          REACT_APP_ENTUR_CLIENT_NAME: entur-shamash2023
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build
          path: |
            build
    runs-on: ubuntu-latest

  deploy_dev:
    needs: [build]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-deploy.yml@v1.2.7
    with:
      gcp_project_id: ent-shamash-dev
      environment: dev
      build_artifact_name: build
      build_artifact_path: build

  deploy_staging:
    needs: [deploy_dev]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-deploy.yml@v1.2.7
    with:
      gcp_project_id: ent-shamash-tst
      environment: tst
      build_artifact_name: build
      build_artifact_path: build

  deploy_prod:
    needs: [deploy_dev, deploy_staging]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-deploy.yml@v1.2.7
    with:
      gcp_project_id: ent-shamash-prd
      environment: prd
      build_artifact_name: build
      build_artifact_path: build
