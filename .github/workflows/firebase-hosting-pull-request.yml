name: Pull request build and deploy
'on': pull_request
jobs:
  build:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.17.0
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v6.1.0
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Install dependencies
        run: yarn --immutable
      - run: yarn test
      - run: yarn build
        env:
          REACT_APP_VERSION: ${{ github.sha }}
          REACT_APP_ENTUR_CLIENT_NAME: entur-shamash2023
          PUBLIC_URL: ''
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build
          path: |
            build

  preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    needs: [build]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-preview.yml@v1.2.7
    with:
      gcp_project_id: ent-shamash-dev
      environment: dev
      build_artifact_name: build
      build_artifact_path: build
